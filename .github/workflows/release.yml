name: Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers ONLY when push a tag like v0.2.0
  workflow_dispatch: # Allows manual trigger

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # temp depriciation fix
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: bun install

      - name: Build Android APKs (EAS Cloud)
        id: eas_build
        run: |
          eas build --platform android \
                    --profile preview \
                    --non-interactive \
                    --wait \
                    --json > build-result.json

          BUILD_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build-result.json)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Download Build Artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${{ steps.eas_build.outputs.build_url }}" ]; then
            echo "❌ Error: Build URL is empty"
            exit 1
          fi
          curl -L -H "Authorization: Bearer $EXPO_TOKEN" -o build-archive.tar.gz "${{ steps.eas_build.outputs.build_url }}"

      - name: Extract and Rename APKs
        run: |
          mkdir -p apks
          tar -xzf build-archive.tar.gz -C apks/

          echo "📦 Full structure of extracted archive:"
          ls -laR apks/

          echo "🔄 Renaming APKs..."

          # Find all APKs recursively (they are inside outputs/apk/release/)
          for apk in $(find apks -name "*.apk" -type f); do
            original=$(basename "$apk")
            # Clean the name: remove "app-" and "-release"
            base=$(echo "$original" | sed 's/^app-//; s/-release//')
            new_name="cryptolens-${{ github.ref_name }}-${base}"

            mv "$apk" "./$new_name"
            echo "✅ Renamed: $original → $new_name"
          done

          echo "🎉 Final APKs ready for release:"
          ls -la cryptolens-*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.apk
          generate_release_notes: true
