name: Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers ONLY when push a tag like v0.2.0
  workflow_dispatch: # Allows manual trigger

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: bun install

      - name: Build Android APKs
        # Build and download (EAS)
        run: eas build --platform android --profile preview --non-interactive --wait --output ./build-archive.tar.gz

      - name: Extract and Rename APKs
        run: |
          mkdir -p apks
          tar -xzf ./build-archive.tar.gz -C apks/

          # Rename them to match your clean v0.1.0 naming convention
          mv apks/*arm64-v8a*.apk ./cryptolens-${{ github.ref_name }}-arm64-v8a.apk
          mv apks/*armeabi-v7a*.apk ./cryptolens-${{ github.ref_name }}-armeabi-v7a.apk
          mv apks/*x86_64*.apk ./cryptolens-${{ github.ref_name }}-x86_64.apk
          mv apks/*universal*.apk ./cryptolens-${{ github.ref_name }}-universal.apk || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.apk
          generate_release_notes: true
